
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/responsive.css">
    <title>Netflix</title>
    <link rel="icon" href="imagens/iconnetflix.webp">
</head>

<body>
    <header>
        <img class="logo" src="imagens/Logonetflix.png" alt="logo do app com o nome Netflix com um vermelho vibrante.">
        <button id="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" aria-label="Alternar tema"></button>
    </header>

    <main class="screen_profiles">
        <h1>Quem está assistindo?</h1>

        <nav>
            <ul class="profiles_list">
                <li>
                    <a href="catalogo/catalogo.html" class="profiles">
                        <figure class="format_figure">
                            <img class="picture" src="imagens/Jinx.jpg" alt="Perfil 1">
                            <figcaption>Lucas</figcaption>
                        </figure>
                    </a>
                </li>
                <li>
                    <a href="catalogo/catalogo.html" class="profiles">
                        <figure class="format_figure">
                            <img class="picture" src="imagens/Hange.jpg" alt="Perfil 2">
                            <figcaption>Henrique</figcaption>
                        </figure>
                    </a>
                </li>
                <li>
                    <a href="catalogo/catalogo.html" class="profiles">
                        <figure class="format_figure">
                            <img class="picture" src="imagens/mult_noturno.jpg" alt="Perfil 3">
                            <figcaption>Dias</figcaption>
                        </figure>
                    </a>
                </li>
                <li>
                    <a href="catalogo/catalogo.html" class="profiles">
                        <figure class="format_figure">
                            <img class="picture" src="imagens/powerNatal.jpg" alt="Perfil 4">
                            <figcaption>Medeiros</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </nav>
    </main>
    <script src="js/index.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
